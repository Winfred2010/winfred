<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In / Sign Up</title>
  <style>
    .container {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .panel {
      width: 50%;
      float: left;
      padding: 40px;
      box-sizing: border-box;
      min-height: 400px;
      transition: transform 0.6s ease;
    }
    .overlay-panel {
      position: absolute;
      top: 0;
      left: 50%;
      width: 50%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-sizing: border-box;
      background: #f7f7f7;
      transition: transform 0.6s ease;
    }
    .right-panel-active .sign-in-panel {
      transform: translateX(100%);
    }
    .right-panel-active .sign-up-panel {
      transform: translateX(100%);
    }
    .right-panel-active .overlay-panel {
      transform: translateX(-100%);
    }
    .btn {
      padding: 12px 24px;
      background: #5a67d8;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="container" class="container">
    <div class="panel sign-in-panel">
      <h2>Sign In</h2>
      <form>
        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Password" required />
        <button class="btn" type="submit">Sign In</button>
      </form>
      <button id="signUp" class="btn" type="button">Go to Sign Up</button>
    </div>

    <div class="panel sign-up-panel">
      <h2>Sign Up</h2>
      <form>
        <input type="text" placeholder="Name" required />
        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Password" required />
        <button class="btn" type="submit">Sign Up</button>
      </form>
      <button id="signIn" class="btn" type="button">Go to Sign In</button>
    </div>

    <div class="overlay-panel">
      <p>Use the buttons to toggle between modes.</p>
    </div>
  </div>

  <script src="Miniprojectsignin formd3.js"></script>
</body>
</html>
