<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise Comparison</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .city-box { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        label { display: block; margin-top: 5px; font-weight: bold; }
        input { margin-bottom: 10px; padding: 5px; width: 200px; }
        button { padding: 10px 20px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #results { margin-top: 20px; padding: 15px; background-color: #f9f9f9; border-left: 5px solid #27ae60; }
    </style>
</head>
<body>

    <h2>Sunrise Comparison</h2>
    <form id="sunriseForm">
        <div class="city-box">
            <strong>City 1 (e.g. Paris)</strong>
            <label for="lat1">Latitude:</label>
            <input type="number" step="any" id="lat1" value="48.864716" required>
            <label for="lng1">Longitude:</label>
            <input type="number" step="any" id="lng1" value="2.349014" required>
        </div>

        <div class="city-box">
            <strong>City 2 (e.g. New York)</strong>
            <label for="lat2">Latitude:</label>
            <input type="number" step="any" id="lat2" value="40.730610" required>
            <label for="lng2">Longitude:</label>
            <input type="number" step="any" id="lng2" value="-73.935242" required>
        </div>

        <button type="submit">Compare Sunrise Times</button>
    </form>

    <div id="results"></div>

    <script>
        const form = document.getElementById('sunriseForm');
        const resultsDiv = document.getElementById('results');

        const getSunrise = async (lat, lng) => {
            const response = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&date=today`);
            if (!response.ok) throw new Error("Fetch failed");
            const data = await response.json();
            return data.results.sunrise;
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            resultsDiv.innerHTML = "Fetching times...";

            const lat1 = document.getElementById('lat1').value;
            const lng1 = document.getElementById('lng1').value;
            const lat2 = document.getElementById('lat2').value;
            const lng2 = document.getElementById('lng2').value;

            // Using Promise.all to wait for both results
            Promise.all([
                getSunrise(lat1, lng1),
                getSunrise(lat2, lng2)
            ])
            .then(([sunrise1, sunrise2]) => {
                resultsDiv.innerHTML = `
                    <p><strong>City 1 Sunrise:</strong> ${sunrise1}</p>
                    <p><strong>City 2 Sunrise:</strong> ${sunrise2}</p>
                `;
            })
            .catch(err => {
                resultsDiv.innerHTML = "Error retrieving data. Check your coordinates.";
                console.error(err);
            });
        });
    </script>
</body>
</html>
