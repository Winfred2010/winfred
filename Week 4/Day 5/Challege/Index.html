<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giphy Manager</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f0f2f5; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        
        #fetchBtn { background-color: #007bff; }
        #deleteAllBtn { background-color: #dc3545; }
        
        .gif-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .gif-card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .gif-card img { display: block; max-height: 200px; margin-bottom: 10px; border-radius: 4px; }
        .delete-btn { background-color: #ffc107; color: black; font-size: 12px; }
    </style>
</head>
<body>

    <div class="controls">
        <form id="searchForm">
            <input type="text" id="categoryInput" placeholder="Enter category (e.g. sun)" required>
            <button type="submit" id="fetchBtn">Fetch GIF</button>
        </form>
        <button id="deleteAllBtn">DELETE ALL</button>
    </div>

    <div id="gallery" class="gif-container"></div>

    <script>
        const API_KEY = "hpvZycW22qCjn5cRM1xtWB8NKq4dQ2My";
        const form = document.getElementById('searchForm');
        const gallery = document.getElementById('gallery');
        const deleteAllBtn = document.getElementById('deleteAllBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const category = document.getElementById('categoryInput').value;
            const url = `https://api.giphy.com/v1/gifs/random?api_key=${API_KEY}&tag=${category}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Fetch failed");
                
                const { data } = await response.json();
                
                if (data.images) {
                    createGifCard(data.images.fixed_height.url, category);
                } else {
                    alert("No GIF found for that category.");
                }
            } catch (error) {
                console.error("Error fetching GIF:", error);
            }
            form.reset();
        });

        function createGifCard(url, title) {
            const card = document.createElement('div');
            card.className = 'gif-card';

            const img = document.createElement('img');
            img.src = url;
            img.alt = title;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerText = 'DELETE';
            deleteBtn.onclick = () => card.remove();

            card.appendChild(img);
            card.appendChild(deleteBtn);
            gallery.appendChild(card);
        }

        deleteAllBtn.onclick = () => gallery.innerHTML = '';
    </script>
</body>
</html>
