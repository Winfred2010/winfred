<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSON Form Output</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
        form { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            max-width: 300px;
        }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { 
            margin-top: 15px; 
            background-color: #3498db; 
            color: white; 
            border: none; 
            padding: 10px; 
            width: 100%; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        #output { 
            margin-top: 20px; 
            padding: 15px; 
            background: #272822; 
            color: #f8f8f2; 
            border-radius: 5px; 
            font-family: monospace;
            white-space: pre; /* Keeps the JSON formatting */
        }
    </style>
</head>
<body>

    <form id="userForm">
        <label for="firstName">Name:</label>
        <input type="text" id="firstName" required>

        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" required>

        <button type="submit">Send</button>
    </form>

    <div id="output">JSON output will appear here...</div>

    <script>
        const form = document.getElementById('userForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function(event) {
            // 1. Prevent the page from refreshing
            event.preventDefault();

            // 2. Retrieve data from inputs
            const data = {
                name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value
            };

            // 3. Convert object to JSON string and append to DOM
            // (null, 2 adds indentation for readability)
            output.textContent = JSON.stringify(data, null, 2);
        });
    </script>

</body>
</html>
