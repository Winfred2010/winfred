<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currency Converter</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            background: url('https://images.unsplash.com/photo-1580519542036-c47de6196ba5?q=80&w=2000') center/cover;
        }
        .card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        select, input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid white;
            color: white;
            border-radius: 4px;
            outline: none;
        }
        option { background: #333; }
        .row { display: flex; gap: 10px; }
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: white; color: black; }
        #result {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Currency Converter</h1>
        <label>From:</label>
        <select id="from"></select>
        <label>To:</label>
        <select id="to"></select>
        <label>Amount:</label>
        <div class="row">
            <input type="number" id="amt" value="1">
            <button id="btn">Convert</button>
        </div>
        <div id="result">3.47333 ILS</div>
    </div>

    <script>
        // REPLACE THIS KEY WITH YOUR OWN FROM EXCHANGERATE-API
        const KEY = 'YOUR_API_KEY'; 
        
        const fromS = document.getElementById('from');
        const toS = document.getElementById('to');
        const resD = document.getElementById('result');
        const amtI = document.getElementById('amt');

        async function init() {
            try {
                const response = await fetch(`https://v6.exchangerate-api.com/v6/${KEY}/codes`);
                const data = await response.json();
                
                let options = "";
                data.supported_codes.forEach(([code, name]) => {
                    options += `<option value="${code}">${code} - ${name}</option>`;
                });
                
                fromS.innerHTML = options;
                toS.innerHTML = options;
                
                fromS.value = "USD";
                toS.value = "ILS";
            } catch (err) {
                resD.innerText = "Error: Invalid API Key";
            }
        }

        async function convert() {
            if (!amtI.value || amtI.value <= 0) return;
            resD.innerText = "Converting...";
            
            try {
                const response = await fetch(`https://v6.exchangerate-api.com/v6/${KEY}/pair/${fromS.value}/${toS.value}/${amtI.value}`);
                const data = await response.json();
                
                if (data.result === "success") {
                    resD.innerText = `${data.conversion_result.toFixed(5)} ${toS.value}`;
                } else {
                    resD.innerText = "Conversion failed";
                }
            } catch (err) {
                resD.innerText = "Check connection/API key";
            }
        }

        document.getElementById('btn').addEventListener('click', convert);
        init();
    </script>
</body>
</html>
