<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Character Loader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background-color: #34495e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; min-height: 300px; }
        h1 { color: #f1c40f; margin-bottom: 20px; }
        .info-box { margin-top: 20px; font-size: 1.1rem; }
        .loading { font-size: 2rem; color: #f1c40f; margin-top: 50px; }
        .error { color: #e74c3c; font-weight: bold; }
        button { background-color: #f1c40f; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 20px; transition: 0.3s; }
        button:hover { background-color: #d4ac0d; transform: scale(1.05); }
        p { margin: 8px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Star Wars Info</h1>
        <div id="content">
            <p>Click the button to find a character!</p>
        </div>
        <button id="getCharacterBtn">Find Someone</button>
    </div>

    <script>
        // Retrieve elements from the DOM
        const btn = document.getElementById('getCharacterBtn');
        const content = document.getElementById('content');

        //  Function to get data from API (Star Wars characters)
        const getCharacter = async () => {
            // Display Loading Icon
            content.innerHTML = '<div class="loading"><i class="fa-solid fa-spinner fa-spin-pulse"></i><p style="font-size: 1rem;">Loading...</p></div>';
            
            const randomId = Math.floor(Math.random() * 83) + 1;

            try {
                //  API URL for Star Wars characters
                const response = await fetch(`https://swapi.dev/api/people/${randomId}`);
                if (!response.ok) throw new Error("Could not find character");
                
                const data = await response.json();
                const char = data; // swapi.dev returns data directly

                // Fetch Home World Name (since homeworld is provided as a URL)
                const homeWorldResponse = await fetch(char.homeworld);
                if (!homeWorldResponse.ok) throw new Error("Could not find homeworld");
                const homeData = await homeWorldResponse.json();
                const homeName = homeData.name; // swapi.dev returns data directly

                // 3. Display info on the DOM
                displayCharacter(char, homeName);

            } catch (err) {
                content.innerHTML = '<div class="error"><i class="fa-solid fa-triangle-exclamation fa-3x"></i><p>Oh No! That person isn\'t available or an error occurred.</p></div>';
                console.error(err);
            }
        };

        const displayCharacter = (char, homeName) => {
            content.innerHTML = `
                <div class="info-box">
                    <h2 style="color: #f1c40f;">${char.name}</h2>
                    <p><strong>Height:</strong> ${char.height}</p>
                    <p><strong>Gender:</strong> ${char.gender}</p>
                    <p><strong>Birth Year:</strong> ${char.birth_year}</p>
                    <p><strong>Home World:</strong> ${homeName}</p>
                </div>
            `;
        };

        btn.addEventListener('click', getCharacter);
    </script>
</body>
</html>
